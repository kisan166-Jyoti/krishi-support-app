@if (authService.currentUser$ | async) {
  <nav class="navbar">
    <div class="nav-container">
      <a routerLink="/" class="nav-brand">
        <span class="brand-icon">🌱</span>
        <span class="brand-text">Krishi Support</span>
      </a>

      <button class="menu-toggle" (click)="menuOpen = !menuOpen" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" [class.open]="menuOpen">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen=false">Home</a></li>
        <li><a routerLink="/advisories" routerLinkActive="active" (click)="menuOpen=false">Advisories</a></li>
        <li><a routerLink="/ask-expert" routerLinkActive="active" (click)="menuOpen=false" class="btn-ask">Ask Expert</a></li>
        <li class="nav-user">
          @if (profileService.currentProfile$ | async; as profile) {
            <span class="user-name">{{ profile.first_name }} {{ profile.last_name }}</span>
          } @else {
            <span class="user-name">Farmer</span>
          }
          <button class="btn-logout" (click)="logout()">Logout</button>
        </li>
      </ul>
    </div>
  </nav>
}
